headers:
  - name: MN
    desc: Match Number
  - name: AC
    desc: Alliance Color
  - name: SI
    desc: Scouter Initials
  - name: T1
    desc: Team 1 Number
  - name: ISPDT1
    desc: Team 1 Infeed Speed
  - name: SSPDT1
    desc: Team 1 Shooter Speed
  - name: ACCT1
    desc: Team 1 Accuracy
  - name: DST1
    desc: Team 1 Driver Skill
  - name: HCT1
    desc: Team 1 Hopper Capacity
  - name: T1DF
    desc: Team 1 Defense
  - name: T1D
    desc: Team 1 Played Defense
  - name: T2
    desc: Team 2 Number
  - name: ISPDT2
    desc: Team 2 Infeed Speed
  - name: SSPDT2
    desc: Team 2 Shooter Speed
  - name: ACCT2
    desc: Team 2 Accuracy
  - name: DST2
    desc: Team 2 Driver Skill
  - name: HCT2
    desc: Team 2 Hopper Capacity
  - name: T2DF
    desc: Team 2 Defense
  - name: T2D
    desc: Team 2 Played Defense
  - name: T3
    desc: Team 3 Number
  - name: ISPDT3
    desc: Team 3 Infeed Speed
  - name: SSPDT3
    desc: Team 3 Shooter Speed
  - name: ACCT3
    desc: Team 3 Accuracy
  - name: DST3
    desc: Team 3 Driver Skill
  - name: HCT3
    desc: Team 3 Hopper Capacity
  - name: T3DF
    desc: Team 3 Defense
  - name: T3D
    desc: Team 3 Played Defense
  - name: EID
    desc: Event ID

team-header-name: TN
match-header-name: MN

preproc-operations:
  - name: Split Team Row
    new-headers: [MN, TC, SI, TN, ISPD, SSPD, ACC, DS, HC, DF, CT, EID]
    operation: >-
      {
        {$MN, $AC, $SI, $T1, *($?T2 - $?T1), ($T2DF / $T2D) - ($T1DF / $T1D), $T2, $EID},
        {$MN, $AC, $SI, $T1, *($?T3 - $?T1), ($T3DF / $T3D) - ($T1DF / $T1D), $T3, $EID},
        {$MN, $AC, $SI, $T2, *($?T1 - $?T2), ($T1DF / $T1D) - ($T2DF / $T2D), $T1, $EID},
        {$MN, $AC, $SI, $T2, *($?T3 - $?T2), ($T3DF / $T3D) - ($T2DF / $T2D), $T3, $EID},
        {$MN, $AC, $SI, $T3, *($?T1 - $?T3), ($T1DF / $T1D) - ($T3DF / $T3D), $T1, $EID},
        {$MN, $AC, $SI, $T3, *($?T2 - $?T3), ($T2DF / $T2D) - ($T3DF / $T3D), $T2, $EID}
      }

filter-unique-fields: [MN, SI, TN, CT] # SI lets multiple people scout the same alliance

subjective-svd-fields:
  - name: Infeed Speed
    source: ISPD
    compare-team-source: CT
    variance-score:
    stability:
  - name: Shooter Speed
    source: SSPD
    compare-team-source: CT
    variance-score:
    stability:
  - name: Accuracy
    source: ACC
    compare-team-source: CT
    variance-score:
    stability:
  - name: Drive Team Skill
    source: DS
    compare-team-source: CT
    variance-score:
    stability:
  - name: Defense
    source: DF
    compare-team-source: CT
    variance-score:
    stability:
  - name: Hopper Capacity
    source: HC
    compare-team-source: CT
    variance-score:
    stability:

compute-fields: []
team-fields: [] 
match-fields: []
data-tests:
  - name: Team/Match Number greater than 0
    expression: $TN > 0 & $MN > 0
  - name: Team Color is valid
    expression: B ` $TC | R ` $TC
  - name: Year is valid
    expression: "'2026' ` $EID"
depth-predict-fields: []
predict-metric:
  name: OPR
  source: OPR
