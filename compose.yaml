services:
  backend:
    image: scouting:latest
    restart: unless-stopped
    container_name: sentinel
    profiles: [prod]
    ports:
      - "5000:5000"
    volumes:
      - appdata:/app

  backend-buildsource:
    build:
      context: .
      dockerfile: dockerimage/dockerfile
    image: scouting:latest
    restart: unless-stopped
    container_name: sentinel
    profiles: [localbuild]
    ports:
      - "5000:5000"
    volumes:
      - appdata:/app

  grafana:
    image: grafana-scouting:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3005:3000"
    volumes:
      - "grafana_storage:/var/lib/grafana"
      - appdata:/app
      - "./grafana.ini:/etc/grafana/grafana.ini"
    profiles: [prod]
    extra_hosts:
      - "host.docker.internal:172.17.0.1" # ip may need to be changed, probably not

  grafana-buildsource:
    build:
      context: .
      dockerfile: grafana-dashboard/dockerfile
    image: grafana-scouting:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3005:3000"
    volumes:
      - "grafana_storage:/var/lib/grafana"
      - appdata:/app
      - "./grafana.ini:/etc/grafana/grafana.ini"
    profiles: [localbuild]
    extra_hosts:
      - "host.docker.internal:172.17.0.1" # ip may need to be changed, probably not

volumes:
  appdata:
    driver: local
  grafana_storage: {}
