name: Build Docker Image

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repo
              uses: actions/checkout@v4
            
            - name: Set up docker build
              uses: docker/setup-buildx-action@v3
              
            # - name: Build docker image
            #   run: docker build -t scouting:latest dockerimage/

            # - name: save dock to tar
            #   run: docker save scouting:latest -o scouting.tar

            - name: Build image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./dockerimage/dockerfile
                tags: myapp:latest
                outputs: type=docker,dest=scoutingtar

            - name: upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: scouting-image
                path: scouting.tar
            
            
