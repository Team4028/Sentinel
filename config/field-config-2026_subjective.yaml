headers:
  - name: MN
    desc: Match Number
  - name: AC
    desc: Alliance Color
  - name: SI
    desc: Scouter Initials
  - name: T1
    desc: Team 1 Number
  - name: HCT1
    desc: Hopper 1 Capacity
  - name: DST1
    desc: Driver Skill Rating 1
  - name: T2
    desc: Team 2 Number
  - name: HCT2
    desc: Hopper 2 Capacity
  - name: DST2
    desc: Driver Skill Rating 2
  - name: T3
    desc: Team 3 Number
  - name: HCT3
    desc: Hopper 3 Capacity
  - name: DST3
    desc: Driver Skill Rating 3
  - name: EID
    desc: Event ID

preproc-operations:
  - name: Split Team Row
    new-headers: [MN, TC, SI, TN, HC, DS, CT, EID]
    operation: >-
      {
        {$MN, $AC, $SI, $T1, *($?T2 - $?T1), $T2, $EID},
        {$MN, $AC, $SI, $T1, *($?T3 - $?T1), $T3, $EID},
        {$MN, $AC, $SI, $T2, *($?T1 - $?T2), $T1, $EID},
        {$MN, $AC, $SI, $T2, *($?T3 - $?T2), $T3, $EID},
        {$MN, $AC, $SI, $T3, *($?T1 - $?T3), $T1, $EID},
        {$MN, $AC, $SI, $T3, *($?T2 - $?T3), $T2, $EID}
      }

filter-unique-fields: [MN, TN, CT]

subjective-svd-fields:
  - name: Hopper Capacity
    source: HC
    compare-team-source: CT
    variance-score:
    stability:
  - name: Drive Team Skill
    source: DS
    compare-team-source: CT
    variance-score:
    stability:

compute-fields: []
team-fields: []
match-fields: []
data-tests: []
depth-predict-fields: []
predict-metric:
  name: OPR
  source: OPR
