name: Build Docker Image

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repo
              uses: actions/checkout@v4
            
            - name: Set up docker build
              uses: docker/setup-buildx-action@v3

            - name: Generate Key 
              run: echo "${{ secrets.TBA_KEY }}" > ${{ github.workspace }}/key.txt
            
            - name: Make Zip Directory
              run: mkdir scouting-app

            - name: Build Scouting Backend
              uses: docker/build-push-action@v6
              with:
                context: ${{github.workspace }}
                file: ./dockerimage/dockerfile
                tags: scouting:latest
                outputs: type=docker,dest=scouting-app/scouting.tar

            - name: Build Grafana Frontend
              uses: docker/build-push-action@v6
              with:
                context: ${{github.workspace}}
                file: ./grafana-dashboard/dockerfile
                tags: grafana-scouting:latest
                outputs: type=docker,dest=scouting-app/grafana-scouting.tar

            - name: Prepare additional archive utilities
              run: |
                cp ./compose.yaml scouting-app
                cp ./docker-compose-runner.env scouting-app/.env
                cp ./docker-compose-runner.sh scouting-app/run.sh
            
            - name: Upload Archive
              uses: actions/upload-artifact@v4
              with:
                name: scouting-app
                path: scouting-app/**
                include-hidden-files: true
            
            
