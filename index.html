<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="favicon.ico" type="image/x-icon">
        <title>Sentinel Downloads</title>
        <style>
            body {
                background-color: #333;
                color: #fff;
            }

            li {
                color: #777;
                transition: background-color 0.25s ease-in-out;
                padding: 5px;
                border-radius: 10px;
            }
            
            li:has(a:hover) {
                background-color: #555;
                cursor: pointer;
            }

            .tag {
                background-color: #222;
                padding: 5px;
                padding-left: 10px;
                margin-right: 5px;
                border: 3px solid #60a;
                padding-right: 10px;
                border-radius: 5px;
            }

            a {
                color: #fff;
            }

            span {
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div style="display: flex; justify-content: center; align-items: center; gap: 5%;">
            <img src="favicon.ico" alt="Beakhead Logo"
                style="height: 8rem; display: inline-block; padding: 0; margin: 0; margin-bottom: 5px;">
            <h1 style="font-size: 50px; display: inline-block;">Sentinel Downloads</h1>
        </div>
        <h3 style="display: flex; justify-content: center; align-items: center; column-gap: 10px;">Hosted URL: </span><a href="">None</a></h3>
        <h2 style="display: flex; justify-content: center; align-items: center;">Releases</h2>
        <ul id="fileDownload" style="display: flex; align-items: center; justify-content: center;">
        </ul>
        <script>
            async function getReleases() {
                const res = await fetch(
                    "https://api.github.com/repos/team4028/Sentinel/releases",
                );
                const data = await res.json();
                const ul = document.getElementById("fileDownload");
                for (const release of data) {
                    const li = document.createElement("li");
                    const tag = document.createElement("span");
                    const a = document.createElement("a");
                    const sp = document.createElement("span");
                    tag.classList.add("tag");
                    tag.textContent = release["tag_name"];
                    const asset = release["assets"][0];
                    a.href = asset["browser_download_url"];
                    a.textContent = release["name"] + "/" + asset["name"];
                    sp.textContent = " -- " + release["updated_at"];
                    a.download = asset["browser_download_url"];
                    li.appendChild(tag);
                    li.appendChild(a);
                    li.appendChild(sp);
                    ul.appendChild(li);
                }
            }
            getReleases();

            //             a.download = file;
            //             li.appendChild(a);
            //             li.appendChild(sp);
            //             ul.appendChild(li);
            //         });
            //     }));
        </script>
    </body>
</html>
