<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- load the favicon.ico beakhead favicon (the thing on the left of the tab) -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{url_for('static', filename='css/button.css')}}">
    <title>{{head}}</title>
    <style>
        :root {
            --accent: {{accent}};
            --text: {{text}};
        }

        * {
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #333;
            color: white;
        }

        button {
            position: absolute;
            top: 10px;
            right: 80px;
            z-index: 10;
            padding: 8px;
            opacity: 1;
            background: var(--accent);
            transition: opacity 0.4s;
            color: var(--text);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
    <!-- use this because otherwise if someone logged in clicked a link like https://sentinelurl/<script>fetch('/do-bad-things', { credentials: 'include' });</script> LOC gets replaced with the script and then the browser sends an authed request -->
    <script>
        window.escapeHtml = function(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</head>

<body
    onload="document.querySelector('p').innerHTML = document.querySelector('p').innerHTML.replace('LOC', window.escapeHtml(window.location.pathname))">
    <div style="display: flex; justify-content: center; align-items: center; gap: 2%;"> <!-- milk -->
        <img src="{{ url_for('static', filename='favicon.ico') }}">
        <h1>{{head}}</h1>
    </div>
    <p style="text-align: center;">{{msg | safe}}</p>
    <button class="sbutton" onclick="window.location.href='{{url_for('main')}}'" title="Ctrl+Backspace">Return Home</button>

    <script>
        window.addEventListener("keydown", ev => {
            if ((ev.ctrlKey || ev.metaKey) && ev.key == "Backspace") {
                ev.preventDefault();
                window.location.href = "{{url_for('main')}}";
            }
        });
    </script>
    <script src="{{url_for('static', filename='js/register-sw.js')}}"
        onload="registerServiceWorker('/service_worker.js')"></script>
</body>

</html>
