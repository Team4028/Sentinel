<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- load the favicon.ico beakhead favicon (the thing on the left of the tab) -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <title>Backend Settings</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #e0e0e0;
            --muted: #9aa0a6;
            --accent: #4dabf7;
            --border: #333;
        }

        * {
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        body {
            margin: 0;
            padding: 2rem;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        h1 {
            margin-bottom: 1rem;
            text-align: center;
        }

        .panel {
            background: var(--panel);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            width: 80%;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--muted);
        }

        input,
        select,
        textarea,
        button {
            text-align: center;
            font-size: large;
            width: 100%;
            margin-top: 0.3rem;
            padding: 0.5rem;
            background: #181818;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        textarea {
            min-height: 200px;
            font-family: monospace;
            resize: vertical;
        }

        .back-cont {
            position: fixed;
            top: 1rem;
            left: 1rem;
        }

        .button-cont {
            position: fixed;
            top: 1rem;
            right: 2rem;
        }

        button {
            font-size: medium;
            margin-top: 1rem;
            cursor: pointer;
            background: var(--accent);
            border: none;
            color: #000;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
        }

        #status {
            font-size: large;
            position: fixed;
            bottom: 1rem;
            right: 2rem;
            z-index: 10;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div class="panel">
        <h1> <img src="{{ url_for('static', filename='favicon.ico') }}" style="height: 5rem; transform: translateY(2rem);"> Sentinel Settings</h1>
        <label title="TBA key cooresponding to the event to pull the prediction schedule from (ie. 2025iri)">
            Event Key
            <input type="text" id="ekey">
        </label>
        <label title="Size in bytes of the maximum amount of csv data that the processor can load into memory at a time">
            CSV Parsing Chunk Size (bytes)
            <input type="number" id="chunksize">
        </label>
        <label title="While type of moderation to use while adding data to the input csv file">
            Append Moderation Behavior
            <select id="restrict-level">
                <option value="0">None</option>
                <option value="1">Passive</option>
                <option value="2">Active</option>
            </select>
        </label>
        <label title="The database file in which the sqlite database for webpush subscriptions is stored">
            Notification Subscription Storage Location
            <input type="text" id="notify-storage">
        </label>
        <label title="The directory in which the input csv file is stored">
            Upload Directory
            <input type="text" id="upl-dir">
        </label>
        <label title="The name of the input csv file">
            Input Filename
            <input type="text" id="inp-file">
        </label>
        <label title="The directory into which the processor outputs files">
            Output Directory
            <input type="text" id="out-dir">
        </label>
        <label title="The base filename of the processor outputs">
            Base Output Filename
            <input type="text" id="out-file">
        </label>
        <label title="The name of the 'other metrics' json generated by the processor (includes things like percent teams scouted)">
            Metrics Output Filename
            <input type="text" id="metric-file">
        </label>
        <label title="The maximum number of matches visible on the match prediction section of the dashboard">
            Number of preview matches to pull from predictor
            <input type="number" id="next-n">
        </label>
    </div>
    <div class="button-cont">
        <button onclick="saveCfg()">Save Changes</button>
        <button onclick="loadCfg()">Discard Changes</button>
    </div>
    <div id="status"></div>
    <div class="back-cont">
        <button onclick="window.location.href='/'">Back</button>
    </div>
    <script>
        const eventKey = document.getElementById("ekey");
        const chunkSize = document.getElementById("chunksize");
        const restrictLevel = document.getElementById("restrict-level");
        const notifyStore = document.getElementById("notify-storage");
        const uploadDir = document.getElementById("upl-dir");
        const uplName = document.getElementById("inp-file");
        const outDir = document.getElementById("out-dir");
        const outFile = document.getElementById("out-file");
        const metricFile = document.getElementById("metric-file");
        const nextN = document.getElementById("next-n");
        const statusDiv = document.getElementById("status");

        async function loadCfg() {
            const res = await fetch("/get-config");
            if (!res.ok) return;
            const json = await res.json();
            eventKey.value = json["EVENT_KEY"];
            chunkSize.value = json["CHUNK_SIZE"];
            restrictLevel.value = json["RESTRICT_APPEND_LEVEL"];
            notifyStore.value = json["NOTIFY_SUB_STORAGE"];
            uploadDir.value = json["UPLOAD_DIR"];
            uplName.value = json["INPUT_FILENAME"];
            outDir.value = json["OUT_DIR"];
            outFile.value = json["BASE_OUTPUT_FILENAME"];
            metricFile.value = json["METRIC_OUTPUT_FILENAME"];
            nextN.value = json["NEXT_N_MATCHES_NUMBER"];
        }

        async function saveCfg() {
            const json = {
                "EVENT_KEY": eventKey.value,
                "CHUNK_SIZE": parseInt(chunkSize.value),
                "RESTRICT_APPEND_LEVEL": parseInt(restrictLevel.value),
                "NOTIFY_SUB_STORAGE": notifyStore.value,
                "UPLOAD_DIR": uploadDir.value,
                "INPUT_FILENAME": uplName.value,
                "OUT_DIR": outDir.value,
                "BASE_OUTPUT_FILENAME": outFile.value,
                "METRIC_OUTPUT_FILENAME": metricFile.value,
                "NEXT_N_MATCHES_NUMBER": parseInt(nextN.value),
            }

            const res = await fetch('/save-app-config', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(json)
            });

            if (res.ok) {
                statusDiv.style.color = "#0a0";
                statusDiv.innerHTML = "";
                statusDiv.innerText = "Save Successful.";
                setTimeout(() => statusDiv.innerHTML = "", 2000);
            } else {
                statusDiv.style.color = "#a00";
                statusDiv.innerHTML = `Save Error: ${await res.text()}`;
            }

        }

        loadCfg();

    </script>
</body>

</html>
