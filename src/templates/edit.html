<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{csrf_token()}}">
    <!-- load the favicon.ico beakhead favicon (the thing on the left of the tab) -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <title>Data Processor Configuration</title>
    <style>
        html,
        body,
        #editor {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }


        #backBtn {
            position: absolute;
            top: 10px;
            right: 80px;
            z-index: 10;
            padding: 8px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 10%;
            cursor: pointer;
            font-size: 14px;
        }

        #saveBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            padding: 8px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 10%;
            cursor: pointer;
            font-size: 14px;
        }

        #status {
            position: absolute;
            top: 50px;
            right: 10px;
            z-index: 10;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <button id="backBtn" onclick="window.location.href='/'">Back</button>
    <button id="saveBtn">Save</button>
    <div id="status"></div>
    <div id="editor"></div>
    <!-- oh yes i did -->
    <!-- loads in monaco (basically vscode web)  -->
    <script src="{{url_for('static', filename='monaco-editor/0.44.0/min/vs/loader.js')}}"></script>
    <script>
        // configuer monaco
        require.config({ paths: { vs: "{{url_for('static', filename='monaco-editor/0.44.0/min/vs')}}" } });
        const ymlContent = {{ yaml_content | tojson | safe}};
        const csrfToken = document.querySelector("meta[name='csrf-token']").getAttribute("content");
        require(['vs/editor/editor.main'], function () {

            window.editor = monaco.editor.create(document.getElementById('editor'), {
                value: ymlContent, // get content from jinja2 from flask
                theme: 'vs-dark',
                language: "yaml", // doesn't really exist but wtvr
                automaticLayout: true
            });
            window.editor.onDidChangeModelContent(() => {
                const current = window.editor.getValue();
                dirty = current !== lastSaved;
                saveBtn.innerHTML = dirty ? "Save &#9679" : "Save"; // add a dot if unsaved
            });
        });

        let lastSaved = ymlContent;
        // dirty = unsaved changes (its a git term)
        let dirty = false;

        const saveBtn = document.getElementById('saveBtn');
        const statusDiv = document.getElementById('status');

        window.addEventListener("keydown", ev => {
            if ((ev.ctrlKey || ev.metaKey) && ev.key == "s") { // override Ctrl+S to save
                ev.preventDefault(); // stop Ctrl+S from doing what it normally does
                saveYAML();
            }
        })

        saveBtn.addEventListener('click', () => {
            saveYAML();
        });

        /**
         * Sends the current yaml file to the server to be saved
         */
        async function saveYAML() {
            const code = window.editor.getValue();
            try {
                const res = await fetch("/save", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ code })
                });
                const data = await res.json();
                if (data.ok) {
                    statusDiv.innerText = "Saved";
                    statusDiv.style.color = "green";
                    lastSaved = code;
                    saveBtn.innerHTML = "Save";
                    dirty = false;
                    setTimeout(() => statusDiv.innerText = "", 2000); // clear after a second
                } else {
                    statusDiv.innerText = "Error: " + data.message;
                    statusDiv.style.color = "red";
                }
            } catch (err) {
                statusDiv.innerText = "Network error";
                statusDiv.style.color = "red";
            }
        }
    </script>
    <script src="{{url_for('static', filename='js/register-sw.js')}}" onload="registerServiceWorker('/service_worker.js', `{{pubkey}}`, '/subscribe')"></script>
</body>

</html>
