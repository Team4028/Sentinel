name: Test

on:
    push:
        branches: ['main']
    workflow_dispatch:
    workflow_call:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
            - name: Set up python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13.1"
            - name: Install requirements
              run: |
                  pip install -r requirements.txt
            - name: Run unit tests
              run: python -m unittest discover -s ./src/tests -p "*test.py" -v
