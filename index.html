<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="favicon.ico" type="image/x-icon">
        <title>Sentinel Downloads</title>
        <style>
            body {
                background-color: #333;
                color: #fff;
            }

            li {
                color: #777;
                transition: background-color 0.25s ease-in-out;
                padding: 5px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 10px;
            }

            ul {
                list-style-type: none;
            }

            a {
                cursor: pointer;
            }
            
            li:has(:hover) {
                background-color: #555;
            }

            .tag {
                background-color: #222;
                padding: 5px;
                padding-left: 10px;
                margin-right: 5px;
                border: 3px solid #60a;
                padding-right: 10px;
                border-radius: 5px;
                cursor: pointer;
            }

            a {
                color: #fff;
            }

            span {
                color: #fff;
                cursor: default;
            }
        </style>
    </head>
    <body>
        <div style="display: flex; justify-content: center; align-items: center; gap: 5%;">
            <img src="favicon.ico" alt="Beakhead Logo"
                style="height: 8rem; display: inline-block; padding: 0; margin: 0; margin-bottom: 5px;">
            <h1 style="font-size: 50px; display: inline-block;">Sentinel Downloads</h1>
        </div>
        <h3 style="display: flex; justify-content: center; align-items: center; column-gap: 10px;">Hosted URL: </span><a href="http://sentinel.beaksquad.dev">http://sentinel.beaksquad.dev</a></h3>
        <h1 style="display: flex; justify-content: center; align-items: center;">Releases</h2>
        <hr style="width: 20%;">
        <ul id="fileDownload" style="display: flex; align-items: center; justify-content: center;">
        </ul>
        <script>
            async function getReleases() {
                const res = await fetch(
                    "https://api.github.com/repos/team4028/Sentinel/releases",
                );
                const data = await res.json();
                const ul = document.getElementById("fileDownload");
                for (const release of data) {
                    const img = document.createElement("img");
                    const li = document.createElement("li");
                    const tag = document.createElement("span");
                    const a = document.createElement("a");
                    const sp = document.createElement("span");
                    const ifr = document.createElement("iframe");
                    img.src = release["author"]["avatar_url"];
                    img.style.borderRadius = "50%";
                    img.style.width = "5%";
                    img.addEventListener('click', () => window.open(release["author"]["html_url"]).focus());
                    img.style.cursor = "pointer";
                    img.style.marginRight = "10px";
                    tag.classList.add("tag");
                    tag.textContent = release["tag_name"];
                    tag.addEventListener('click', () => window.open(release["html_url"]).focus());
                    const asset = release["assets"][0];
                    a.href = asset["browser_download_url"];
                    a.textContent = release["name"] + "/" + asset["name"];
                    sp.textContent = " -- " + release["updated_at"];
                    a.download = asset["browser_download_url"];
                    ifr.src = release["html_url"];
                    li.appendChild(img);
                    li.appendChild(tag);
                    li.appendChild(a);
                    li.appendChild(sp);
                    ul.appendChild(li);
                }
            }
            getReleases();
        </script>
    </body>
</html>
