<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="{{url_for('static', filename='fonts/neuropolitical.css')}}" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='tabulator/tabulator.css')}}">
    <script src="{{url_for('static', filename='tabulator/parser.js')}}"></script>
    <script src="{{url_for('static', filename='tabulator/tabulator.js')}}"></script>
    <script src="{{url_for('static', filename='js/qrcode.js')}}"></script>
    <!-- load the favicon.ico beakhead favicon (the thing on the left of the tab) -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <title>Scouting App Backend Frontend</title>

    <style>
        :root {
            --accent: {{accent}};
            --text: {{text}};
        }

        * {
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #181a1b;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .overlay {
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .upload-box {
            position: absolute;
            width: 40%;
            height: 80%;
            padding: 25px;
            background-color: #444;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .drop-zone {
            border: 2px dashed #555;
            background: #1e1e2f;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            color: #aaa;
        }

        .drop-zone.dragover {
            border-color: color-mix(in srgb, var(--accent), white 20%);
            background: #24292b;
        }

        #table {
            height: 400px;
        }

        #text-input {
            width: 90%;
            margin-top: 10px;
            padding: 20px;
            background-color: #666;
            color: #000;
            border: 1px solid #555;
            border-radius: 6px;
            resize: vertical;
        }

        #text-input::placeholder {
            color: #333;
        }

        #progress-container {
            width: 100%;
            background: #333;
            margin-top: 15px;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        #progress-bar {
            width: 0;
            height: 100%;
            background: color-mix(in srgb, var(--accent), white 20%);
            transition: width 0.2s;
        }

        #status {
            margin-top: 12px;
            font-size: 14px;
            min-height: 18px;
        }


        input[type="file"] {
            /* hide the file input so its just the div */
            display: none;
        }

        .btn {
            margin-top: 18px;
            display: inline-block;
            padding: 10px 18px;
            background: var(--accent);
            color: var(--text);
            font-weight: bold;
            box-shadow: none;
            border-radius: 6px;
            opacity: 1;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.4s;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .btn:enabled:hover {
            /* .btn:enabled so that the bg no change when hvr :| */
            opacity: 0.8;
        }

        select {
            margin-top: 15px;
            padding: 8px;
            width: 100%;
            border-radius: 6px;
            border: 1px solid #555;
            background: #333;
            color: #fff;
        }

        dialog {
            border: none;
            border-radius: 12px;
            padding: 20px 30px;
            width: 400px;
            max-width: 90%;
            background-color: #1e1e2f;
            color: #f0f0f0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            font-family: 'Segoe UI', sans-serif;
        }

        dialog h1 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        dialog select,
        dialog button {
            margin-top: 15px;
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
        }

        dialog::backdrop {
            background-color: rgba(0, 0, 0, 0.6);
        }

        .top-corner-div {
            position: fixed;
            display: flex;
            flex-direction: row;
            gap: 10px;
            top: 10px;
            right: 10px;
        }

        .settings-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: large;
            width: 40px;
            height: 40px;
            padding: 10px;
            margin: 0;
            color: var(--text);
        }

        input {
            color: #e0e0e0;
            text-align: center;
            font-size: large;
            margin-top: 0.3rem;
            padding: 0.5rem;
            background: #181818;
            border: 1px solid #333;
            border-radius: 4px;
        }

        .logout-btn {
            display: inline-block;
            align-items: center;
            justify-content: center;
            font-size: small;
            width: 80px;
            height: 40px;
            padding: 10px;
            margin: 0;
            color: var(--text);
        }
    </style>
</head>

<body
    style="background-size: cover; background-position: center; background-image: url({{url_for('static', filename='4028.jpeg')}});">
    <div class="overlay">
    </div>
    <div class="upload-box" id="the-box">
        <div style="display: flex; justify-content: center; align-items: center; gap: 5%;">
            <img src="{{ url_for('static', filename='favicon.ico') }}"
                style="height: 8rem; display: inline-block; padding: 0; margin: 0; margin-bottom: 5px;">
            <h1 style="font-size: 50px; font-family: 'Neuropolitical', sans-serif; display: inline-block;">Sentinel</h1>
        </div>

        <!-- Exactly what it says it is: is a div because everything is handled by eventlisteners -->
        <div id="drop-zone" class="drop-zone" tabindex="0">
            Drag & Drop or Click to Select a File
        </div>
        <!-- Holds the selected file -->
        <input id="file-input" type="file" />

        <div id="table" style="width: 100%; display: none;"></div>

        <!-- Enter csv text to upload -->
        <textarea id="text-input" placeholder="CSV Data..."></textarea>

        <!-- Whether to append to or overwrite the current data -->
        <select id="endpoint-select">
            <!-- value is the server endpoint -->
            <option value="/append">Append</option>
            <option value="/upload">Overwrite</option>
        </select>

        <dialog id="team-upl">
            <h1>Upload Team Picture</h1>
            <label title="Team number as an integer" style="display: block;">
                Team Number
                <input type="number" id="team-name" style="display: block;">
            </label>
            <br>
            <label title="Picture as any common picture format" style="display: block;">
                Picture
                <input type="file" id="team-file" style="display: block;">
            </label>
            <button id="send-pic" class="btn">Upload</button>
            <button id="pic-cancel" class="btn">Cancel</button>
        </dialog>

        <!-- Download dialog box -->
        <dialog id="surprise">
            <h1>Pick a file</h1>
            <select id="cake-select">
                <!-- All of the files -->
                <option title="data_in.csv" value="data_in.csv">Data Input</option>
                <option title="output.csv" value="output.csv">Data Output</option>
                <option title="output.csv-teams.csv" value="output.csv-teams.csv">Team Stats</option>
                <option title="output.csv-matches.csv" value="output.csv-matches.csv">Past Match Performance
                </option>
                <option title="output.csv-morepredict.csv" value="output.csv-morepredict.csv">Future Match Stats
                </option>
                <option title="output.csv-predict.csv" value="output.csv-predict.csv">Match Predictions</option>
                <option title="pit-scouting.csv" value="output.csv-pit-scouting.csv">Pit Scouting</option>
                <option title="other-metrics.json" value="other-metrics.json">Other Metrics</option>
            </select>
            <button id="send-it" class="btn">Download</button>
            <button id="cancel" class="btn">Cancel</button>
        </dialog>

        <!-- Buttons -->
        <button id="upload-btn" class="btn" disabled title="Ctrl+U">Upload</button>
        <button id="reload-btn" class="btn" title="Ctrl+A (a for again because Ctrl+R is important)">Reload</button>
        <button id="pic-btn" class="btn" title="Ctrl+P">Upload Picture</button>
        <button id="download-btn" class="btn" title="Ctrl+D">Download</button>
        <button class="btn" onclick="window.location.href='{{url_for('edit_yaml')}}'" title="Ctrl+E"
            id="edit-cfg-btn">Edit
            Config</button>
        <button id="picklist-btn" class="btn" title="Ctrl+Q" style="width: 120px;"
            onclick="window.location.href='{{url_for('picklist')}}'">Picklist</button>
        <button id="pit-btn" class="btn" title="Ctrl+S" style="width: 120px;"
            onclick="window.location.href='{{url_for('pit_scout')}}'">Pit Scout</button>
        <button id="dash-btn" class="btn" title="Ctrl+V" style="width: 120px;"
            onclick="window.open('{{graf_url}}', '_blank').focus()">Dashboard</button>
        <div class="top-corner-div">
            <button class="btn logout-btn" id="mode-btn" style="width: 120px;" onclick="setSending(!isSending)"
                title="Ctrl+M">Pit Mode</button>
            <button class="btn logout-btn" id="lock-btn" style="width: 100px;"
                onclick="lockTab=!lockTab;document.getElementById('lock-btn').style.backgroundColor = lockTab ? '#a00' : 'var(--accent)';document.getElementById('speed-qr-container').style.display = lockTab ? 'flex' : 'none';"
                title="Ctrl+B">Scan Mode</button>
            <button class="btn settings-btn" id="settings"
                onclick="window.location.href='{{url_for('edit_app_conf_page')}}'" title="Ctrl+I">⚙️</button>
            <button class="btn logout-btn" id="logout" onclick="window.location.href='{{url_for('logout')}}'"
                title="Ctrl+L">Log out</button>
        </div>

        <div class="top-corner-div"
            style="left: 10px; display: none; flex-direction: column; padding: 20px; width: fit-content; backdrop-filter: blur(3px); border-radius: 10px; border: 1px solid rgba(0, 0, 0, 0.5)"
            id="speed-qr-container">
            <label style="display: block; font-size: large;">Change QR Speed</label>
            <div style="display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 10px;">
                <div id="speedqr"
                    style="border-radius: 10px; background-color: var(--text); padding: 10px; display: inline-block;">
                </div>
                <input type="number" id="speednum" value="5" min="0" max="60"
                    style="display: inline-block; height: 10%;">
            </div>
        </div>

        <!-- Progress bar -->
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <!-- Status text -->
        <div id="status" style="color: black;"></div>

    </div>

    <script>
        let isSending = false;
        let data = [];
        const headers = JSON.parse(`{{headers|safe}}`);
        const data_init = JSON.parse(`{{inp_data|safe}}`);
        for (const data_init_row of data_init) {
            if (data_init_row != "")
                data.push(Object.assign({}, ...Papa.parse(data_init_row, { delimiter: ",", quotes: true, skipEmptyLines: true,  }).data[0].map((d, i) => ({ [headers[i].toLowerCase()]: d }))));
        }
        let lockTab = false;
        const table = new Tabulator('#table', {
            data: data,
            columns: headers.map(s => ({ title: s, field: s.toLowerCase() }))
        });

        async function sha256(str) {
            const strBuf = new TextEncoder().encode(str);
            const hashBuf = await window.crypto.subtle.digest('SHA-256', strBuf);
            const hashArr = Array.from(new Uint8Array(hashBuf));
            return hashArr.map(b => ('00' + b.toString(16)).slice(-2)).join('');
        }

        async function tableRowDCHandler(_, row) {
            const cells = row.getCells();
            let fullStr = [];
            for (var cell of cells) {
                fullStr.push(cell.getValue());
            }

            fetch("{{url_for('delete_lines')}}", {
                method: 'POST',
                headers: {
                    'Content-Type': "application/json",
                    "sending": isSending
                },
                body: JSON.stringify({
                    lines: [await sha256(fullStr.join(','))],
                    mn: row.getCell("mn").getValue(),
                    si: row.getCell("si").getValue()
                })
            }).then(res => {
                if (res.status == 200) {
                    let idx = row.getPosition();
                    row.delete();
                    data.splice(idx - 1, 1);
                } else if (res.status == 401 || res.status == 403) {
                    statusText = "Error: Auth error, are you logged in?";
                } else if (res.status == 500) {
                    res.text().then(t => statusText = `Error: Internal server error: ${t}`);
                }
            });
        }

        table.on("rowDblClick", tableRowDCHandler);

        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const textInput = document.getElementById("text-input");
        const uploadBtn = document.getElementById("upload-btn");
        const progressContainer = document.getElementById("progress-container");
        const progressBar = document.getElementById("progress-bar");
        const endpointSelect = document.getElementById("endpoint-select");
        const statusText = document.getElementById("status");
        const pictureButton = document.getElementById("pic-btn");
        const reloadButton = document.getElementById("reload-btn");
        const downloadButton = document.getElementById("download-btn");
        const dialog = document.getElementById("surprise");
        const teamName = document.getElementById("team-name");
        const teamPic = document.getElementById("team-file");
        const editCfgBtn = document.getElementById("edit-cfg-btn");
        const settingsButton = document.getElementById("settings");
        const logoutButton = document.getElementById("logout");
        const speedQr = document.getElementById("speedqr");
        const speedNum = document.getElementById("speednum");
        const modeBtn = document.getElementById("mode-btn");
        const pitScoutButton = document.getElementById("pit-btn");
        const dashButton = document.getElementById("dash-btn");
        const picklistButton = document.getElementById("picklist-btn");
        const speedQRCode = new QRCode(speedQr, {
            text: "@01993505@",
            width: 128,
            height: 128,
            colorDark: window.getComputedStyle(document.documentElement).getPropertyValue("--accent"),
            colorLight: window.getComputedStyle(document.documentElement).getPropertyValue("--text"),
            correctLevel: QRCode.CorrectLevel.H
        });

        let selectedFile = null;

        /**
         * Creates a promise that waits for the dialog window to be resolved, faking a modal dialog
         */
        function fakeWaitingForGodot(dlog, confirmBtnID, closeBtnID, selectorID, isRealFile) {
            return new Promise(resolve => {
                dlog.showModal();
                dlog.addEventListener("close", function handler() {
                    dlog.removeEventListener("close", handler);
                    resolve({
                        cancelled: dlog.returnValue === "cancel",
                        file: isRealFile ? document.getElementById(selectorID).files[0] : document.getElementById(selectorID).value
                    });
                });

                document.getElementById(confirmBtnID).onclick = () => {
                    dlog.returnValue = "";
                    dlog.close();
                };
                document.getElementById(closeBtnID).onclick = () => dlog.close("cancel");
                dlog.addEventListener("cancel", () => dlog.close("cancel"), { once: true });
            })
        }

        /**
         * Check if there's actually a file selected, and enable the upload button if there is
         */
        function updateUploadEnabled() {
            uploadBtn.disabled = !((selectedFile || textInput.value.trim().length > 0) && (textInput.value.match(new RegExp(',', 'g')) || []).length === headers.length - 1);
        }

        dropZone.addEventListener("click", () => fileInput.click()); // passthrough from normal div to file selector

        fileInput.addEventListener("change", () => {
            selectedFile = fileInput.files[0];
            dropZone.textContent = selectedFile ? selectedFile.name : "Drag & Drop or Click to Select a File";
            updateUploadEnabled();
        });

        textInput.addEventListener("input", updateUploadEnabled);

        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("dragover");
        });

        dropZone.addEventListener("keydown", ev => { // support tab select
            if (ev.key == "Enter")
                fileInput.click();
        });



        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("dragover");
        });

        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("dragover");
            selectedFile = e.dataTransfer.files[0]; // this is the file they dropped
            dropZone.textContent = selectedFile ? selectedFile.name : "Drag & Drop or Click to Select a File";
            updateUploadEnabled();
        });

        uploadBtn.addEventListener("click", () => {
            if (selectedFile) {
                uploadFile(selectedFile);
            } else if (textInput.value.trim().length > 0) {
                uploadText(textInput.value.trim());
            }
        });

        speedNum.addEventListener('input', () => {
            speedNum.value = Math.min(60, Math.max(0, speedNum.value));
            speedQRCode.clear();
            speedQRCode.makeCode(`@019935${('00' + speedNum.value.toString()).slice(-2)}@`);
        });

        function reloadCallback() {
            progressContainer.style.display = "block";
            progressBar.style.width = "0";
            statusText.innerText = `[${new Date().toLocaleString()}] ` + "Reloading data..."
            fetch("{{url_for('reprocess')}}", {
                method: "POST"
            }).then(async res => {
                progressBar.style.width = "100%";
                statusText.innerText = `[${new Date().toLocaleString()}] ` + await res.text();
            });
        }

        reloadButton.addEventListener("click", reloadCallback);

        window.addEventListener("keydown", ev => {
            if ((ev.ctrlKey || ev.metaKey) && ev.key === "e" && !isSending) { // override Ctrl+S to save
                ev.preventDefault(); // stop Ctrl+S from doing what it normally does
                window.location.href = "{{url_for('edit_yaml')}}";
            } else if (ev.key === "Enter" && lockTab && isSending && document.activeElement === textInput) {
                ev.preventDefault();
                if (!uploadBtn.disabled) uploadBtn.click();
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "s" && !isSending) {
                ev.preventDefault();
                window.location.href = "{{url_for('pit_scout')}}";
            } else if (ev.key === "Tab" && lockTab && isSending && document.activeElement === textInput) {
                ev.preventDefault();
                const start = textInput.selectionStart;
                const end = textInput.selectionEnd;
                textInput.value = textInput.value.substring(0, start) + "," + textInput.value.substring(end);
                textInput.selectionStart = textInput.selectionEnd = start + 1;
                updateUploadEnabled();
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "b") {
                ev.preventDefault();
                lockTab = !lockTab;
                document.getElementById('lock-btn').style.backgroundColor = lockTab ? '#a00' : 'var(--accent)';
                document.getElementById('speed-qr-container').style.display = lockTab ? 'flex' : 'none';
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "i" && !isSending) {
                ev.preventDefault();
                window.location.href = "{{url_for('edit_app_conf_page')}}";
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "m") {
                ev.preventDefault();
                setSending(!isSending);
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "l") {
                ev.preventDefault();
                window.location.href = "{{url_for('logout')}}";
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "q") {
                ev.preventDefault();
                window.location.href = "{{url_for('picklist')}}";
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "v" && document.activeElement !== textInput) {
                ev.preventDefault();
                window.open("{{graf_url}}", '_blank').focus();
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "u") {
                ev.preventDefault();
                if (!uploadBtn.disabled)
                    uploadBtn.click();
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "a" && !isSending && document.activeElement !== textInput) {
                ev.preventDefault();
                reloadButton.click();
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "d") {
                ev.preventDefault();
                downloadButton.click();
            } else if ((ev.ctrlKey || ev.metaKey) && ev.key === "p" && !isSending) {
                ev.preventDefault();
                pictureButton.click();
            }
        });

        // use a mut observer to set the text to red if there's an error (slightly cursed)
        const obs = new MutationObserver((mutlist) => {
            for (const mutation of mutlist) {
                if (mutation.type === "childList" || mutation.type === "characterData") {
                    if (statusText.innerText.toLowerCase().includes("error"))
                        statusText.style.color = "#a00";
                    else statusText.style.color = "#000";
                }
            }
        });

        obs.observe(statusText, {
            characterData: true,
            childList: true,
            subtree: true,
        });

        function setCookie(name, value, days) {
            var expires = "";
            if (days) {
                var date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }
        function getCookie(name) {
            var nameEQ = name + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }
        function eraseCookie(name) {
            document.cookie = name + '=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
        }

        downloadButton.addEventListener("click", async () => {
            const res = await fakeWaitingForGodot(dialog, "send-it", "cancel", "cake-select", false);
            if (!res.cancelled)
                downloadFile(res.file);
        });

        pictureButton.addEventListener("click", async () => {
            const res = await fakeWaitingForGodot(document.getElementById("team-upl"), "send-pic", "pic-cancel", "team-file", true);
            if (!res.cancelled)
                uploadPicture(res.file);
        });

        setSending(getCookie('isSending') ?? false);

        // @019935xx@ where xx is speed

        table.on("tableBuilt", function () { table.redraw(); })

        function setSending(sending) {
            endpointSelect.value = "/append";
            if (isSending = sending) {
                dropZone.style.display = "none";
                endpointSelect.style.display = "none";
                pictureButton.style.display = "none";
                reloadButton.style.display = "none";
                settingsButton.style.display = "none";
                editCfgBtn.style.display = "none";
                pitScoutButton.style.display = "none";
                picklistButton.style.display = "none";
                dashButton.style.display = "none";
                textInput.style.width = "95%";
                modeBtn.innerText = "Stands Mode";
                document.getElementById("the-box").style.width = "90%";
                document.getElementById("table").style.display = "block";
                try {
                    table.redraw();
                } catch (_) { }
            } else {
                dropZone.style.display = "block";
                endpointSelect.style.display = "block";
                pictureButton.style.display = "inline-block";
                reloadButton.style.display = "inline-block";
                editCfgBtn.style.display = "inline-block";
                settingsButton.style.display = "flex";
                pitScoutButton.style.display = "inline-block";
                picklistButton.style.display = "inline-block";
                dashButton.style.display = "inline-block";
                textInput.style.width = "90%";
                modeBtn.innerText = "Pit Mode";
                document.getElementById("the-box").style.width = "40%";
                document.getElementById("table").style.display = "none";
            }

            setCookie('isSending', sending, 40);
        }

        /**
         * Upload a selected picture to the server
         */
        function uploadPicture(file) {
            statusText.textContent = `[${new Date().toLocaleString()}] Uploading picture ${file}`;
            progressBar.style.width = 0;
            progressContainer.style.display = "block";
            const fData = new FormData();
            fData.append('photo', file);
            const xhr = new XMLHttpRequest();
            xhr.open("POST", "{{url_for('upload_photo')}}", true);
            xhr.setRequestHeader('team', String(teamName.value));

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = `${percent}%`;
                }
            }

            xhr.onload = () => {
                if (xhr.status === 200) {
                    statusText.textContent = `[${new Date().toLocaleString()}] Upload complete!`;
                } else {
                    statusText.textContent = `[${new Date().toLocaleString()}] Upload failed: ${xhr.responseText}`;
                }

                teamName.value = "";
                teamPic.value = "";
            };

            xhr.onerror = (err) => {
                statusText.textContent = `[${new Date().toLocaleString()}] Error occured: ${err}`;
            }

            xhr.send(fData);
        }

        /**
         * Requests a stream to a server file and then uses it to download the file locally
         */
        function downloadFile(file) {
            statusText.textContent = `[${new Date().toLocaleString()}] Downloading file ${file}`;
            // reset bar
            progressBar.style.width = 0;
            progressContainer.style.display = "block";
            const xhr = new XMLHttpRequest();
            xhr.open('GET', `{{url_for('dload', file='')}}${file}`, true);
            xhr.responseType = "blob";

            xhr.onloadstart = () => {
                statusText.textContent = `[${new Date().toLocaleString()}] Downloading...`;
            }

            xhr.onprogress = (event) => {
                if (event.lengthComputable) {
                    const percent = (event.loaded / event.total) * 100;
                    progressBar.style.width = percent + "%";
                } else {
                    statusText.textContent = `[${new Date().toLocaleString()}] Downloaded ${event.loaded} bytes`;
                }
            }

            xhr.onerror = (err) => {
                statusText.textContent = `[${new Date().toLocaleString()}] Error downloading file: ${err}`;
            }

            xhr.onload = () => {
                progressBar.style.width = "100%";
                if (xhr.status === 200) {
                    const blob = xhr.response;
                    const a = document.createElement('a'); // make a link to the file so that we can click it to download automatically
                    a.href = URL.createObjectURL(blob);
                    a.download = file;
                    a.click(); // click the download link
                    URL.revokeObjectURL(a.href);
                    statusText.textContent = `[${new Date().toLocaleString()}] File downloaded: ${file}`;
                } else {
                    xhr.response.text().then(t => statusText.textContent = `[${new Date().toLocaleString()}] Error downloading file: ${t}`);
                }
            }

            xhr.send();
        }

        /**
         * Send the selected file to the selected endpoint on the backend
         */
        function uploadFile(file) {
            const url = endpointSelect.value;

            statusText.textContent = `[${new Date().toLocaleString()}] Uploading: ${file.name}`; // timestamp
            // reset progressbar
            progressContainer.style.display = "block";
            progressBar.style.width = "0";

            const formData = new FormData();
            formData.append("data", file);

            const xhr = new XMLHttpRequest();
            xhr.open("POST", url, true);

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    // update bar
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = percent + "%";
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    statusText.textContent = `[${new Date().toLocaleString()}] Upload complete!`;
                } else {
                    statusText.textContent = `[${new Date().toLocaleString()}] ` + "Upload failed: " + xhr.responseText;
                }

                // clear the fileInput from the prev file
                fileInput.value = "";
                dropZone.textContent = "Drag & Drop or Click to Select a File";
                selectedFile = null;
                updateUploadEnabled();
            };

            xhr.onerror = (err) => {
                statusText.textContent = `[${new Date().toLocaleString()}] Error ocurred: ${err}`;
            };

            xhr.send(formData);

        }

        /**
         * Creates a blob with the input area text content to send it to the proper backend endpoint
         */
        function uploadText(text) {
            const url = endpointSelect.value;

            if (isSending) {
                data.push(Object.assign({}, ...Papa.parse(text, { delimiter: ",", quotes: true, skipEmptyLines: true }).data[0].map((d, i) => ({ [headers[i].toLowerCase()]: d }))));
                if (table) {
                    table.setData(data);
                }
            }

            table.redraw();

            const rows = table.getRows();
            if (rows.length > 0)
                rows[rows.length - 1].scrollTo("top", true);

            statusText.textContent = `[${new Date().toLocaleString()}] Uploading text...`;
            // reset progress bar
            progressContainer.style.display = "block";
            progressBar.style.width = "0";

            const blob = new Blob([text], { type: "text/plain" });

            const formData = new FormData();
            formData.append("data", blob, "data.csv"); // fake csv upload

            const xhr = new XMLHttpRequest();
            xhr.open("POST", url, true);
            xhr.setRequestHeader('sending', isSending);

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    // update prog bar with css
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = percent + "%";
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    statusText.textContent = `[${new Date().toLocaleString()}] Upload Complete!`;
                } else {
                    statusText.textContent = `[${new Date().toLocaleString()}] Upload failed: ${xhr.responseText}`;
                }
                textInput.selectionStart = textInput.selectionEnd = 0;
                textInput.value = "";
            };

            xhr.onerror = (err) => {
                statusText.textContent = `[${new Date().toLocaleString()}] Error occured: ${err}`;
            };

            xhr.send(formData);
        }
    </script>
